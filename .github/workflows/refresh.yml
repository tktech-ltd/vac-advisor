name: Refresh Advisory Data

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Silences the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch all advisory sources
        run: python fetch_advisories.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add advisory_data.json
          # Only commit if data actually changed
          git diff --staged --quiet || git commit -m "chore: refresh advisory data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
